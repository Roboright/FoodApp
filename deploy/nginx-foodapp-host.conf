server {
    listen 80;
    server_name _;

    root /home/robrecht/webserver;
    index index.html;

    # Static landing page
    location / {
        try_files $uri $uri/ =404;
    }

    # Proxy /foodapp to the Next.js app
    location /foodapp {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        proxy_buffering off;
    }

    # Browser fetch() calls use /api/... without the basePath prefix —
    # rewrite them to /foodapp/api/... so Next.js can match its own routes.
    location /api {
        rewrite ^/api/(.*) /foodapp/api/$1 break;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
    }
}
